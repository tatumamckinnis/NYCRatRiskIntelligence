# Alembic configuration for rat-api.
# Run from the repo root: uv run --package rat-api alembic -c api/alembic.ini upgrade head

[alembic]
# Path to migration scripts, relative to this file's directory (api/).
script_location = alembic

# Connection URL is overridden in env.py via DIRECT_DATABASE_URL env var.
# The placeholder here prevents Alembic from erroring if env.py is not loaded.
sqlalchemy.url = postgresql://placeholder

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
