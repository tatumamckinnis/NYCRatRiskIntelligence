name: Web — test and deploy

on:
  push:
    branches: [main]
    paths:
      - "web/**"
  pull_request:
    paths:
      - "web/**"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm --filter web exec tsc --noEmit

      - name: Lint
        run: pnpm --filter web exec eslint .

      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_MAPTILER_KEY: ${{ secrets.NEXT_PUBLIC_MAPTILER_KEY }}

  # Vercel deploys automatically via its GitHub integration on push to main.
  # This job is a placeholder in case a manual deploy hook is ever needed.
  deploy:
    name: Deploy (Vercel)
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Vercel deploys automatically via GitHub integration
        run: echo "Vercel deployment triggered by GitHub integration."
