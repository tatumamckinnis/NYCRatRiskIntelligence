services:
  - type: web
    name: rat-api
    runtime: python
    # Root is the repo root so uv can find the workspace uv.lock
    buildCommand: pip install uv && uv sync --package rat-api
    startCommand: uv run --package rat-api uvicorn rat_api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OTEL_SERVICE_NAME
        value: rat-api
      - key: PYTHON_VERSION
        value: "3.12"
      # Free tier has 512MB RAM — skip the ~570MB BGE-M3 and ~570MB BGE Reranker models.
      # Retrieval falls back to BM25-only (still accurate enough for cited answers).
      - key: DISABLE_VECTOR_SEARCH
        value: "true"
      - key: DISABLE_RERANKER
        value: "true"
    autoDeploy: true
    plan: free
